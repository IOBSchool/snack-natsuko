<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="8;url=apply-snack.html">
<title>紹介制度は終了しました｜THE THREAD 2日間チャレンジ</title>
<style>
  :root{--bg:#f8f5ef;--ink:#2a2622;--sub:#6b6158;--accent:#c08a5e;--accent-soft:#fdf6ec;--line:#e6ddd0;--card:#ffffff}
  *{box-sizing:border-box}
  body{margin:0;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;background:var(--bg);color:var(--ink);line-height:1.95;font-size:15px;-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .wrap{max-width:520px;width:100%;text-align:center}
  .label{color:var(--accent);font-size:10.5px;letter-spacing:.3em;font-family:sans-serif;margin-bottom:14px}
  h1{font-size:20px;line-height:1.75;margin:0 0 18px;font-weight:500}
  p{margin:0 0 14px;font-size:14px;color:var(--sub);line-height:2}
  .card{background:var(--card);border:1px solid var(--line);border-radius:6px;padding:36px 28px;box-shadow:0 8px 24px rgba(120,98,80,.06)}
  .cta{display:inline-block;margin-top:22px;background:var(--accent);color:#fff;text-decoration:none;padding:16px 36px;border-radius:4px;font-size:14.5px;letter-spacing:.08em;box-shadow:0 4px 16px rgba(192,138,94,.25)}
  .alt{display:block;margin-top:14px;font-size:12.5px;color:var(--sub)}
  .alt a{color:var(--accent);text-decoration:underline}
  .auto{margin-top:22px;font-size:11.5px;color:var(--sub);letter-spacing:.05em}
  footer{position:fixed;bottom:18px;left:0;right:0;text-align:center;font-size:11px;color:var(--sub)}
  @media(min-width:768px){
    h1{font-size:24px}
    .card{padding:48px 36px}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="card">
    <div class="label">NOTICE</div>
    <h1>紹介制度は<br>終了しました。</h1>
    <p>
      お友達を1人連れてくると半額になる「紹介制度」は、現在受付を終了しています。<br>
      代わりに、スナックなつこ(4/28・5/7)にご参加された方向けの<br>
      <strong style="color:var(--accent);font-weight:500">半額(¥2,200)特典</strong>をご用意しています。
    </p>
    <a class="cta" href="apply-snack.html">スナック特典で申し込む（¥2,200）▶</a>
    <span class="alt">スナックに参加していない方は <a href="apply-single.html">通常料金(¥4,400)で申し込む</a></span>
    <div class="auto">8秒後に自動でスナック特典申込ページへ移動します</div>
  </div>
</div>

<footer>© THE THREAD / Institut für Organic Business GmbH</footer>

</body>
</html>
